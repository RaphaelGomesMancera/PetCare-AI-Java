spring.application.name=PetCare AI+

# =====================
# H2 Database (in-memory)
# =====================
spring.datasource.url=jdbc:h2:mem:petcaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =====================
# JPA / Hibernate
# =====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =====================
# H2 Console (acesse: http://localhost:8080/h2-console)
# =====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================
# Cache
# =====================
spring.cache.type=simple

# =====================
# Swagger UI (acesse: http://localhost:8080/swagger-ui/index.html)
# =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# =====================
# Paginacao padrao
# =====================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
